name: healthlink_desktop
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  responsive_framework: ^1.5.1
  window_manager: ^0.5.1
  fl_chart: ^0.68.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.5.0
  web_socket_channel: ^3.0.3

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0

  # Utils
  flutter_dotenv: ^5.1.0
  file_picker: ^8.0.0+1
  intl: ^0.19.0

  # Models / codegen
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  freezed: ^2.5.2

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env